ЗАКРЫВАЙ ФНАФ ШЛЁПА ОЧЕНЬ СЛОЖНЫЙ🐈🐈🐈🐈🐈🐈🐈🐈🐈🐈🐈🐈
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FNAF Shlepa</title>

<style>
body{background:black;color:white;text-align:center;font-family:sans-serif}

#game{width:700px;height:400px;background:#222;margin:auto;position:relative;border:3px solid white}

#shlepa{
position:absolute;
width:60px;
height:60px;
top:0;
left:320px;
background-image:url("https://avatars.mds.yandex.net/i?id=04bde35dcc850f7b0005ebea974dffcf_l-10641465-images-thumbs&n=13");
background-size:cover;
}

.door{
position:absolute;
top:0;
width:60px;
height:400px;
background:black;
border:2px solid white;
}

#doorL{left:0}
#doorR{right:0}

#shaft{
position:absolute;
bottom:0;
left:300px;
width:100px;
height:60px;
border:2px solid white;
background:black;
}

#death{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:red;
color:white;
font-size:40px;
justify-content:center;
align-items:center;
flex-direction:column;
}
</style>
</head>

<body>

<h2 id="title">FNAF ШЛЁПА</h2>

<select id="lang" onchange="setLang()">
<option value="ru">Русский</option>
<option value="en">English</option>
</select>

<br><br>

<button onclick="startGame()" id="startBtn">Начать</button>

<div id="game">

<div id="shlepa"></div>

<div id="doorL" class="door"></div>
<div id="doorR" class="door"></div>

<div id="shaft"></div>

</div>

<br>

<button onclick="toggleDoor('L')" id="leftBtn">Левая дверь</button>
<button onclick="toggleDoor('R')" id="rightBtn">Правая дверь</button>
<button onclick="toggleShaft()" id="shaftBtn">Шахта</button>

<div id="death">
<div id="deathText">ВЫ УМЕРЛИ ОТ ШЛЁПА</div>
<button onclick="restart()" id="restartBtn">Начать заново</button>
</div>

<script>

let shlepa=document.getElementById("shlepa")

let doorL=false
let doorR=false
let shaft=false

let target=""

function startGame(){

moveLoop()

setInterval(()=>{
choosePath()
},4000)

}

function choosePath(){

let r=Math.floor(Math.random()*3)

if(r==0)target="left"
if(r==1)target="right"
if(r==2)target="shaft"

}

function moveLoop(){

let x=shlepa.offsetLeft
let y=shlepa.offsetTop

if(target=="left"){
x-=2
}

if(target=="right"){
x+=2
}

if(target=="shaft"){
y+=2
}

shlepa.style.left=x+"px"
shlepa.style.top=y+"px"

checkAttack()

requestAnimationFrame(moveLoop)

}

function checkAttack(){

let x=shlepa.offsetLeft
let y=shlepa.offsetTop

if(target=="left" && x<80){

if(!doorL) kill()
else resetShlepa()

}

if(target=="right" && x>560){

if(!doorR) kill()
else resetShlepa()

}

if(target=="shaft" && y>330){

if(!shaft) kill()
else resetShlepa()

}

}

function resetShlepa(){

shlepa.style.left="320px"
shlepa.style.top="0px"

}

function kill(){

setTimeout(()=>{

document.getElementById("death").style.display="flex"

},2000)

}

function toggleDoor(side){

if(side=="L"){
doorL=!doorL
document.getElementById("doorL").style.background=doorL?"white":"black"
}

if(side=="R"){
doorR=!doorR
document.getElementById("doorR").style.background=doorR?"white":"black"
}

}

function toggleShaft(){

shaft=!shaft
document.getElementById("shaft").style.background=shaft?"white":"black"

}

function restart(){
location.reload()
}

function setLang(){

let l=document.getElementById("lang").value

if(l=="ru"){
title.innerText="FNAF ШЛЁПА"
startBtn.innerText="Начать"
leftBtn.innerText="Левая дверь"
rightBtn.innerText="Правая дверь"
shaftBtn.innerText="Шахта"
deathText.innerText="ВЫ УМЕРЛИ ОТ ШЛЁПА"
restartBtn.innerText="Начать заново"
}

if(l=="en"){
title.innerText="FNAF SHLEPA"
startBtn.innerText="Start"
leftBtn.innerText="Left door"
rightBtn.innerText="Right door"
shaftBtn.innerText="Vent"
deathText.innerText="YOU DIED FROM SHLEPA"
restartBtn.innerText="Restart"
}

}

</script>

</body>
</html>
